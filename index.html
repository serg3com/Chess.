<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chess GitHub Pages</title>
<style>
body{font-family:Arial,sans-serif;background:#222;color:#fff;text-align:center;margin:0}
h1{margin:20px}
#board{width:min(90vw,640px);height:min(90vw,640px);margin:auto;display:grid;grid-template-columns:repeat(8,1fr);border:3px solid #000}
.sq{display:flex;align-items:center;justify-content:center;font-size:min(8vw,48px)}
.light{background:#eeeed2}.dark{background:#769656}
</style>
</head>
<body>
<h1>CHESS GitHub Pages</h1>
<p>Первая версия для GitHub Pages.</p>
<div id="board"></div>
<script>
const board=document.getElementById("board");
const pos=[
["♜","♞","♝","♛","♚","♝","♞","♜"],
["♟","♟","♟","♟","♟","♟","♟","♟"],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["♙","♙","♙","♙","♙","♙","♙","♙"],
["♖","♘","♗","♕","♔","♗","♘","♖"]
];
for(let r=0;r<8;r++){
 for(let c=0;c<8;c++){
  const d=document.createElement("div");
  d.className="sq "+(((r+c)%2==0)?"light":"dark");
  d.textContent=pos[r][c];
  board.appendChild(d);
 }
}
</script>
</body>
</html>
